<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Portal | Welcome</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    :root {
      --primary:    #00d4ff;
      --primary-dark:#00aaff;
      --accent:     #ff4c4c;
      --glass:      rgba(255, 255, 255, 0.08);
      --glass-border:rgba(255, 255, 255, 0.12);
      --text:       #f0f4ff;
      --text-muted: rgba(240, 244, 255, 0.75);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100dvh;
      background: linear-gradient(135deg, #0f0c1d, #1a1336, #2a1b4d);
      background-size: 300% 300%;
      animation: gradientFlow 18s ease infinite;
      display: grid;
      place-items: center;
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }

    @keyframes gradientFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .welcome-card {
      width: min(480px, 92vw);
      padding: 3.2rem 2.8rem;
      background: var(--glass);
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 
        0 20px 50px rgba(0, 0, 0, 0.6),
        inset 0 0 30px rgba(0, 212, 255, 0.08);
      text-align: center;
      opacity: 0;
      transform: translateY(30px);
      animation: cardEnter 1.1s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.3s;
    }

    @keyframes cardEnter {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .welcome-card h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #00ffd5, #00aaff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome-card h2 {
      font-size: 1.15rem;
      font-weight: 400;
      opacity: 0.85;
      margin-bottom: 1.8rem;
    }

    .welcome-card p {
      font-size: 0.95rem;
      line-height: 1.65;
      margin-bottom: 2.5rem;
      opacity: 0.88;
      max-width: 380px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      align-items: center;
    }

    .btn {
      width: 100%;
      max-width: 320px;
      padding: 1rem 1.8rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transform: translateX(-100%);
      transition: transform 0.7s;
    }

    .btn:hover::before {
      transform: translateX(100%);
    }

    .btn-dashboard {
      background: linear-gradient(90deg, #00d4ff, #00aaff);
      color: #0a0a1f;
    }

    .btn-companies {
      background: linear-gradient(90deg, #6b48ff, #9d4edd);
      color: white;
    }

    .btn-logout {
      background: transparent;
      color: #ff6b6b;
      border: 2px solid #ff6b6b;
    }

    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 30px rgba(0, 212, 255, 0.25);
    }

    .btn-logout:hover {
      background: rgba(255, 107, 107, 0.12);
      box-shadow: 0 14px 30px rgba(255, 107, 107, 0.2);
    }

    .footer {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      opacity: 0.6;
      letter-spacing: 0.5px;
    }

    @media (max-width: 480px) {
      .welcome-card {
        padding: 2.5rem 1.8rem;
      }
      .welcome-card h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

  <div class="welcome-card">
    <h1>Welcome, HR Officer</h1>
    <h2>Placement & Recruitment Management Portal</h2>

    <p>
      You are now logged into the HR Portal.<br>
      Manage company profiles, review student applications,<br>
      track placement drives, view analytics, and more.
    </p>

    <div class="btn-group">
      <a href="{{ url_for('hr.dashboard') }}" class="btn btn-dashboard">
        <i class="fas fa-tachometer-alt"></i> Go to Dashboard
      </a>

      <a href="#" class="btn btn-companies">
        <i class="fas fa-building"></i> Manage Companies
      </a>

      <a href="{{ url_for('hr.logout') }}" class="btn btn-logout">
        <i class="fas fa-sign-out-alt"></i> Logout
      </a>
    </div>

    <div class="footer">
      © 2026 SETU College Placement Cell • HR Portal
    </div>
  </div>

</body>
</html>
