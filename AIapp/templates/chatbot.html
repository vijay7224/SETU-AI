<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot • बातचीत शुरू करें</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    :root {
      --bg: #0f0f17;
      --card: #161624;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #00d4ff;
      --primary-dark: #00aaff;
      --user-msg: #2563eb;
      --bot-msg: #2d3748;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--card);
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary);
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .message {
      max-width: 82%;
      padding: 1rem 1.3rem;
      border-radius: 1.2rem;
      line-height: 1.45;
      position: relative;
      animation: fadeIn 0.4s ease-out;
    }

    .user {
      align-self: flex-end;
      background: var(--user-msg);
      color: white;
      border-bottom-right-radius: 0.4rem;
    }

    .bot {
      align-self: flex-start;
      background: var(--bot-msg);
      border-bottom-left-radius: 0.4rem;
    }

    .message img {
      max-width: 240px;
      border-radius: 12px;
      margin-top: 0.6rem;
    }

    .input-area {
      background: var(--card);
      padding: 1rem 1.5rem;
      border-top: 1px solid #2d3748;
      display: flex;
      gap: 0.8rem;
    }

    #messageInput {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 0.9rem 1.4rem;
      color: white;
      font-size: 1rem;
      outline: none;
    }

    #messageInput:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15);
    }

    button {
      background: var(--primary);
      color: #0f172a;
      border: none;
      border-radius: 999px;
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.2s;
    }

    button:hover {
      background: var(--primary-dark);
      transform: scale(1.08);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .typing {
      display: flex;
      gap: 6px;
      padding: 1rem 1.3rem;
      background: var(--bot-msg);
      border-radius: 1.2rem;
      width: fit-content;
      border-bottom-left-radius: 0.4rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    @media (max-width: 500px) {
      .chat-container { padding: 1rem; }
      .input-area { padding: 0.9rem 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">ChatBot</div>
  <div style="opacity:0.7; font-size:0.9rem;">Grok • Hindi में बात करें</div>
</header>

<div class="chat-container" id="chatContainer">

  <!-- शुरुआती मैसेज -->
  <div class="message bot">
    नमस्ते! मैं आपका AI साथी हूँ।<br>
    आज आप किस बारे में बात करना चाहते हैं? 😄
  </div>

</div>

<div class="input-area">
  <input type="text" id="messageInput" placeholder="अपना मैसेज लिखें..." autocomplete="off"/>
  <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
const chatContainer = document.getElementById('chatContainer');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');

// Send message on button click
sendBtn.addEventListener('click', sendMessage);

// Send on Enter key (without Shift)
messageInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function sendMessage() {
  const text = messageInput.value.trim();
  if (!text) return;

  // User message
  const userMsg = document.createElement('div');
  userMsg.className = 'message user';
  userMsg.textContent = text;
  chatContainer.appendChild(userMsg);

  // Clear input
  messageInput.value = '';
  messageInput.focus();

  // Scroll to bottom
  chatContainer.scrollTop = chatContainer.scrollHeight;

  // Show typing indicator
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chatContainer.appendChild(typing);
  chatContainer.scrollTop = chatContainer.scrollHeight;

  // Simulate bot response (you can replace with real API call)
  setTimeout(() => {
    chatContainer.removeChild(typing);

    const botMsg = document.createElement('div');
    botMsg.className = 'message bot';

    // यहाँ असली API कॉल डाल सकते हैं
    // अभी सिर्फ सैंपल रिप्लाई
    if (text.toLowerCase().includes('हाय') || text.toLowerCase().includes('hello')) {
      botMsg.textContent = 'हाय! बहुत अच्छा लगा आपसे मिलकर 😊 क्या हाल है?';
    } else if (text.includes('नाम')) {
      botMsg.textContent = 'मेरा नाम Grok है। आपका नाम क्या है?';
    } else {
      botMsg.innerHTML = `आपने कहा: <strong>${text}</strong><br><br>मैं अभी सीख रहा हूँ... थोड़ा और ट्रेनिंग चाहिए 😂<br>फिर भी बताइए, क्या मदद करूँ?`;
    }

    chatContainer.appendChild(botMsg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }, 1200 + Math.random() * 800); // 1.2 से 2 सेकंड रैंडम डिले
}
</script>

</body>
</html>
