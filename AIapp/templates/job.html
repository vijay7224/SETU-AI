<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Search • SETU</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
      padding: 20px;
    }
    .job-card {
      background: rgba(30, 41, 59, 0.9);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      transition: all 0.3s;
    }
    .job-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 30px rgba(0, 212, 255, 0.18);
      border-color: #00d4ff;
    }
    .company-logo {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      border: 1px solid rgba(0,212,255,0.3);
    }
    .job-title {
      color: #67e8f9;
      font-weight: 700;
      font-size: 1.3rem;
    }
    .company-name {
      color: #94a3b8;
      font-size: 1rem;
    }
    .skill {
      font-size: 0.8rem;
      background: rgba(103,232,249,0.1);
      color: #67e8f9;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid rgba(103,232,249,0.3);
      margin: 0 4px 6px 0;
      display: inline-block;
    }
    .bookmark {
      font-size: 1.4rem;
      cursor: pointer;
      color: #64748b;
    }
    .bookmark.saved {
      color: #fbbf24;
    }
    .filter-box {
      background: rgba(30,41,59,0.6);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 25px;
    }
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: #64748b;
    }
  </style>
</head>
<body>

<div class="container" style="max-width: 1100px;">

  <h2 class="text-center mb-4 fw-bold" style="color:#00f0ff">Job & Internship Search</h2>

  <!-- Filters -->
  <div class="filter-box row g-3">
    <div class="col-md-4">
      <input id="search" class="form-control bg-dark text-white border-secondary" placeholder="Company, role, skill...">
    </div>
    <div class="col-md-3">
      <select id="location" class="form-select bg-dark text-white border-secondary">
        <option value="">Any Location</option>
        <option>Bengaluru</option>
        <option>Hyderabad</option>
        <option>Pune</option>
        <option>Gurugram</option>
        <option>Noida</option>
        <option>Remote</option>
      </select>
    </div>
    <div class="col-md-3">
      <select id="type" class="form-select bg-dark text-white border-secondary">
        <option value="">Any Type</option>
        <option value="Full-time">Full-time</option>
        <option value="Internship">Internship</option>
      </select>
    </div>
    <div class="col-md-2">
      <button onclick="clearFilters()" class="btn btn-outline-light w-100">Clear</button>
    </div>
  </div>

  <!-- Job List -->
  <div id="jobs"></div>

  <div id="emptyMsg" class="empty d-none">
    <i class="fa fa-search fa-4x mb-3"></i>
    <h4>No jobs found</h4>
    <p>Try different search or filters</p>
  </div>

</div>

<script>
// Real-looking job data (2026 context)
const jobs = [
  {id:1, company:"Google", title:"Software Engineer L4", location:"Bengaluru", type:"Full-time", salary:"₹22–34 LPA", applyBy:"March 2026", skills:["Python","Golang","System Design","Kubernetes"], logo:"https://ui-avatars.com/api/?name=Google&background=4285F4&color=fff"},
  {id:2, company:"Amazon", title:"Data Engineer", location:"Hyderabad", type:"Full-time", salary:"₹18–26 LPA", applyBy:"Feb 2026", skills:["AWS","Spark","SQL","Airflow"], logo:"https://ui-avatars.com/api/?name=Amazon&background=FF9900&color=fff"},
  {id:3, company:"Microsoft", title:"SDE-2 Backend", location:"Hyderabad", type:"Full-time", salary:"₹25–38 LPA", applyBy:"April 2026", skills:["C#","Azure","Microservices"], logo:"https://ui-avatars.com/api/?name=Microsoft&background=0078D4&color=fff"},
  {id:4, company:"Flipkart", title:"Frontend Intern", location:"Bengaluru", type:"Internship", salary:"₹45k/month", applyBy:"March 2026", skills:["React","Next.js","TypeScript"], logo:"https://ui-avatars.com/api/?name=Flipkart&background=FF3F6C&color=fff"},
  {id:5, company:"Zomato", title:"Backend Developer", location:"Gurugram", type:"Full-time", salary:"₹16–25 LPA", applyBy:"March 2026", skills:["Node.js","Go","PostgreSQL"], logo:"https://ui-avatars.com/api/?name=Zomato&background=E23744&color=fff"},
  {id:6, company:"Swiggy", title:"Machine Learning Engineer", location:"Bengaluru", type:"Full-time", salary:"₹28–42 LPA", applyBy:"April 2026", skills:["Python","PyTorch","MLflow"], logo:"https://ui-avatars.com/api/?name=Swiggy&background=FC8019&color=fff"},
  {id:7, company:"Adobe", title:"Full Stack Engineer", location:"Noida", type:"Full-time", salary:"₹18–28 LPA", applyBy:"March 2026", skills:["React","Java","Spring Boot"], logo:"https://ui-avatars.com/api/?name=Adobe&background=FF0000&color=fff"},
  {id:8, company:"PhonePe", title:"Android Engineer", location:"Bengaluru", type:"Full-time", salary:"₹20–32 LPA", applyBy:"March 2026", skills:["Kotlin","Jetpack","GraphQL"], logo:"https://ui-avatars.com/api/?name=PhonePe&background=5F2EE5&color=fff"},
  {id:9, company:"Atlassian", title:"SRE", location:"Bengaluru", type:"Full-time", salary:"₹30–45 LPA", applyBy:"May 2026", skills:["Kubernetes","AWS","Prometheus"], logo:"https://ui-avatars.com/api/?name=Atlassian&background=0052CC&color=fff"},
  {id:10, company:"Cred", title:"Product Engineer", location:"Bengaluru", type:"Full-time", salary:"₹25–40 LPA", applyBy:"April 2026", skills:["TypeScript","React Native","Node"], logo:"https://ui-avatars.com/api/?name=Cred&background=0A84FF&color=fff"}
];

let saved = JSON.parse(localStorage.getItem('setuSaved') || '[]');

function render() {
  const container = document.getElementById('jobs');
  container.innerHTML = '';

  const search = document.getElementById('search').value.toLowerCase().trim();
  const loc = document.getElementById('location').value;
  const typ = document.getElementById('type').value;

  const filtered = jobs.filter(j => {
    const text = (j.company + ' ' + j.title + ' ' + j.skills.join(' ')).toLowerCase();
    const matchSearch = !search || text.includes(search);
    const matchLoc   = !loc || j.location === loc;
    const matchType  = !typ || j.type === typ;
    return matchSearch && matchLoc && matchType;
  });

  if (filtered.length === 0) {
    document.getElementById('emptyMsg').classList.remove('d-none');
    return;
  }

  document.getElementById('emptyMsg').classList.add('d-none');

  filtered.forEach(job => {
    const isSaved = saved.includes(job.id);
    const card = `
      <div class="job-card">
        <div class="d-flex justify-content-between align-items-start">
          <div class="d-flex gap-3">
            <img src="${job.logo}" class="company-logo" alt="${job.company}">
            <div>
              <div class="job-title">${job.title}</div>
              <div class="company-name">${job.company} • ${job.location}</div>
            </div>
          </div>
          <i class="fa fa-bookmark bookmark ${isSaved ? 'saved' : ''}" 
             onclick="toggleSave(${job.id}, this)"></i>
        </div>

        <div class="mt-3">
          <span class="text-success"><i class="fa fa-money-bill me-1"></i>${job.salary}</span>
          <span class="ms-3 text-info"><i class="fa fa-calendar me-1"></i>Apply by ${job.applyBy}</span>
          <span class="ms-3 text-warning"><i class="fa fa-clock me-1"></i>${job.type}</span>
        </div>

        <div class="mt-3">
          ${job.skills.map(s => `<span class="skill">${s}</span>`).join('')}
        </div>
      </div>
    `;
    container.innerHTML += card;
  });
}

function toggleSave(id, el) {
  if (saved.includes(id)) {
    saved = saved.filter(x => x !== id);
    el.classList.remove('saved');
  } else {
    saved.push(id);
    el.classList.add('saved');
  }
  localStorage.setItem('setuSaved', JSON.stringify(saved));
}

function clearFilters() {
  document.getElementById('search').value = '';
  document.getElementById('location').value = '';
  document.getElementById('type').value = '';
  render();
}

// Live search
document.getElementById('search').oninput = render;
document.getElementById('location').onchange = render;
document.getElementById('type').onchange = render;

// Start
render();
</script>
</body>
</html>
